[nodejs]
symbol = "[⬢](bold green) "

[git_branch]
symbol = ' '

[git_metrics]
disabled = true

[git_status]
style = 'bg:black fg:bold green'
disabled = true

[cmake]
symbol = 'cmake '

[terraform]
symbol = ' '

[battery]
discharging_symbol = "⚡️ "

[gcloud]
symbol = '󰊶 '
format = '[$symbol$active]($style) '

[time]
disabled = false
time_format = '%T UTC'
utc_time_offset = '0'

# Example: teleport-blue.alpha-shadowbox.cloud-alpha-use1-tooling-shard01-002
#          ____________________________________________ $1   $2       $3      $4
[kubernetes]
disabled = false
format = 'kctx [$context(: $namespace)]($style) '
style = 'red bold' # default style if cluster unrecognized
contexts = [
  { context_pattern = ".*-alpha-([^-]+)-([^-]+)-([^-]+)-([0-9]+)", style = "bold green", context_alias = "🟢 $2 ($1)" },
  { context_pattern = ".*-staging-([^-]+)-([^-]+)-([^-]+)-([0-9]+)", style = "bold yellow", context_alias = "🟡 $2 ($1)" },
  { context_pattern = ".*-production-([^-]+)-([^-]+)-([^-]+)-([0-9]+)", style = "bold red", context_alias = "🔴 $2 ($1)" },
]
