# Use 'C-s' to read in this file's settings. And 'C-e' to edit it
bind-key C-s source-file "$XDG_CONFIG_HOME/tmux/tmux.conf" \; display-message "Sourced tmux.conf"
bind-key C-e new-window \; send-keys "\$EDITOR $XDG_CONFIG_HOME/tmux/tmux.conf" Enter

# Source all the other config files
source-file $XDG_CONFIG_HOME/tmux/plugin/*

# Source local (machine-specific) plugins if any exist
if-shell 'test -d "$XDG_DATA_HOME/tmux/plugin"' 'source-file $XDG_DATA_HOME/tmux/plugin/*'

# And some more config files if we're remote
if-shell 'test -n "$SSH_CLIENT"' 'source-file $XDG_CONFIG_HOME/tmux/plugin/remote/*'
