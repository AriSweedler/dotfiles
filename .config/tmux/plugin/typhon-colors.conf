################################## borders ################################# {{{
# Make pane borders prettier. I don't like having a pane-border-format
border_inactive=white
border_active=colour22
set-option -g pane-border-style fg=${border_inactive}
set-option -g pane-active-border-style fg=${border_active},bg=${border_active}
############################################################################ }}}
################################### panes ################################## {{{
# Set the color of the active window. And dim inactive panes. So useful!
fg_active_window=colour15
bg_active_window=colour235
fg_inactive_window=colour245
bg_inactive_window=colour238
set-option -g window-active-style fg=${fg_active_window},bg=${bg_active_window}
set-option -g window-style fg=${fg_inactive_window},bg=${bg_inactive_window}
############################################################################ }}}
################################# messages ################################# {{{
# make messages look cool 8) #wannabeHackerman
fg_system=colour28,bold
bg_system=colour0
set-option -g message-style fg=${fg_system},bg=${bg_system}
############################################################################ }}}
############################ typhon statusline ############################# {{{
# Colors for the typhon statusline. Defined here (not in typhon-statusline.conf,
# which is sourced last) so that typhon plugins can reference them when building
# typhon_modes.
typhon_fg_default=colour16
typhon_bg_default=colour245
typhon_fg_active=colour252
typhon_bg_active=colour92
typhon_bg_select=colour3
typhon_bg_zoom=colour30
typhon_bg_sync=colour53
typhon_bg_copy=colour22
typhon_bg_off=colour88

# Alt colors for typhon mode indicators. Use these in typhon plugins
# (e.g. typhon_gb="colour18") to distinguish different mode families.
typhon_alt1=colour18   # blue
typhon_alt2=colour22   # green
typhon_alt3=colour53   # purple
typhon_alt4=colour130  # orange
typhon_alt5=colour88   # red
typhon_alt6=colour30   # teal
typhon_alt7=colour94   # brown
typhon_alt8=colour61   # lavender

# Background colors for current and previous windows (in the statusline)
typhon_bg=colour237
typhon_fg=colour230,bold
typhon_bg_highlight=colour25
typhon_bg_highlight_2=colour240

# Reset typhon mode indicator — plugins append to this for statusline display
typhon_modes=""
############################################################################ }}}
