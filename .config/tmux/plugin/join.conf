# Important default commands to remember:
# <Prefix>! ==> opposite of `J` - break pane into new window

##################################### Join #####################################
# Press prefix+J to enter the "join" key table
bind-key -T prefix J switch-client -T join
bind-key -T join Escape switch-client -T prefix

# display-panes shows numbers; tapping a number runs the template with %% = selected pane.
# Source defaults to current pane (no -s needed).
# In the join table:
# * v = join to create vertical divider (side-by-side)
# * h = join to create horizontal divider (top/bottom)
bind-key -T join v display-panes "join-pane -h -t '%%'"
bind-key -T join h display-panes "join-pane -v -t '%%'"

################################# Join Window ##################################
# Cross-window join: prefix J W <window-digit> <pane-digit> <h|v>
# W saves the source pane_id, then enters join-window table.
bind-key -T join W set-option -gF @join_src "#{pane_id}" \; switch-client -T join-window
bind-key -T join-window Escape switch-client -T prefix

# Digits select a window, show its panes via display-panes.
# Tapping a pane saves the fully-qualified target (window.pane) and enters join-orient.
bind-key -T join-window 0 select-window -t :0 \; display-panes "set-option -gF @join_target '#{window_index}.%%' ; switch-client -T join-orient"
bind-key -T join-window 1 select-window -t :1 \; display-panes "set-option -gF @join_target '#{window_index}.%%' ; switch-client -T join-orient"
bind-key -T join-window 2 select-window -t :2 \; display-panes "set-option -gF @join_target '#{window_index}.%%' ; switch-client -T join-orient"
bind-key -T join-window 3 select-window -t :3 \; display-panes "set-option -gF @join_target '#{window_index}.%%' ; switch-client -T join-orient"
bind-key -T join-window 4 select-window -t :4 \; display-panes "set-option -gF @join_target '#{window_index}.%%' ; switch-client -T join-orient"
bind-key -T join-window 5 select-window -t :5 \; display-panes "set-option -gF @join_target '#{window_index}.%%' ; switch-client -T join-orient"
bind-key -T join-window 6 select-window -t :6 \; display-panes "set-option -gF @join_target '#{window_index}.%%' ; switch-client -T join-orient"
bind-key -T join-window 7 select-window -t :7 \; display-panes "set-option -gF @join_target '#{window_index}.%%' ; switch-client -T join-orient"
bind-key -T join-window 8 select-window -t :8 \; display-panes "set-option -gF @join_target '#{window_index}.%%' ; switch-client -T join-orient"
bind-key -T join-window 9 select-window -t :9 \; display-panes "set-option -gF @join_target '#{window_index}.%%' ; switch-client -T join-orient"

# Final step: press h or v to complete the cross-window join.
# run-shell reads back the saved @join_src and @join_target options.
# In the join-orient table:
# * v = join to create vertical divider (side-by-side)
# * h = join to create horizontal divider (top/bottom)
bind-key -T join-orient h run-shell 'tmux join-pane -v -s "$(tmux show-option -gqv @join_src)" -t "$(tmux show-option -gqv @join_target)"'
bind-key -T join-orient v run-shell 'tmux join-pane -h -s "$(tmux show-option -gqv @join_src)" -t "$(tmux show-option -gqv @join_target)"'
bind-key -T join-orient Escape switch-client -T prefix

################################ Statusline ####################################
# Plugin mode indicator (appended to shared statusline_plugin_mode variable)
bgsm_join="colour18"
statusline_plugin_mode="${statusline_plugin_mode}#{?#{==:#{client_key_table},join},#[bg=${bgsm_join}] (J) ,}"
statusline_plugin_mode="${statusline_plugin_mode}#{?#{==:#{client_key_table},join-window},#[bg=${bgsm_join}] (JW) ,}"
statusline_plugin_mode="${statusline_plugin_mode}#{?#{==:#{client_key_table},join-orient},#[bg=${bgsm_join}] (JW:h/v?) ,}"
