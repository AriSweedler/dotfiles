# When this remote tmux loses outer focus (the outer terminal/tmux switches
# to a different window or app), make every pane go to the same dimmed look
# so there's no visual "active pane" competing with the truly-active pane
# elsewhere. Without this, every nested tmux renders its own active pane the
# same way regardless of whether it's the currently-focused one, and at a
# glance it isn't clear which tmux is *the* active one.
#
# Three styles, three states:
#   @active-style    →  active pane in the focused tmux         (no dim)
#   @inactive-style  →  inactive panes in the focused tmux      (light dim)
#   @dimmed-style    →  every pane in an unfocused tmux         (heavy dim)
#
# pane-focus-out gates on #{pane_active} so the full-dim only fires when
# the client lost focus. Within-tmux pane switches also fire pane-focus-out
# on the now-inactive previous pane (where pane_active is false); those
# fall through and the normal active/inactive split takes over via
# pane-focus-in on the newly-active pane.
#
# Requires focus-events on (set in plugin/settings.conf, which is sourced
# unconditionally so it applies on the remote too).

set -g @active-style   "fg=default,bg=default"
set -g @inactive-style "fg=colour245,bg=default"
set -g @dimmed-style   "fg=colour240,bg=colour236"

set -g window-style        "#{@inactive-style}"
set -g window-active-style "#{@active-style}"

set-hook -g pane-focus-out {
  if-shell -F '#{pane_active}' \
    "set window-active-style '#{@dimmed-style}' ; set window-style '#{@dimmed-style}'"
}

set-hook -g pane-focus-in {
  set window-active-style '#{@active-style}'
  set window-style '#{@inactive-style}'
}
