# Important default commands to remember:
# <Prefix>! ==> opposite of `J` - break pane into new window

typhon_gb="${typhon_alt1}"

##################################### Join #####################################
# PREFIX J to enter the "join" key table
bind-key -T prefix J switch-client -T typhon-join
bind-key -T typhon-join Escape switch-client -T prefix
bind-key -T typhon-join ? run-shell '"$TYPHON_SCRIPTS/help.sh" typhon-join'
typhon_modes="${typhon_modes}#{?#{==:#{client_key_table},typhon-join},#[bg=${typhon_gb}] (J) ,}"

# In the join table:
# * v = join to create vertical divider (side-by-side)
# * h = join to create horizontal divider (top/bottom)
bind-key -T typhon-join v display-panes "join-pane -h -t '%%'"
bind-key -T typhon-join h display-panes "join-pane -v -t '%%'"

################################# Join Window ##################################
# PREFIX J W to enter the "typhon-join-window" key table
bind-key -T typhon-join W set-option -gF @join_src "#{pane_id}" \; switch-client -T typhon-join-window
bind-key -T typhon-join-window Escape switch-client -T typhon-join
bind-key -T typhon-join-window ? run-shell '"$TYPHON_SCRIPTS/help.sh" typhon-join-window'
typhon_modes="${typhon_modes}#{?#{==:#{client_key_table},typhon-join-window},#[bg=${typhon_gb}] (JW) ,}"

# In the typhon-join-window table:
# * Digits select a window, then show its panes via display-panes. Selecting a
#   pane saves the fully-qualified target (window.pane) and enters the "hidden"
#   typhon-join-window-orient table
bind-key -T typhon-join-window 0 select-window -t :0 \; display-panes "set-option -gF @join_target '#{window_index}.%%' ; switch-client -T typhon-join-window-orient"
bind-key -T typhon-join-window 1 select-window -t :1 \; display-panes "set-option -gF @join_target '#{window_index}.%%' ; switch-client -T typhon-join-window-orient"
bind-key -T typhon-join-window 2 select-window -t :2 \; display-panes "set-option -gF @join_target '#{window_index}.%%' ; switch-client -T typhon-join-window-orient"
bind-key -T typhon-join-window 3 select-window -t :3 \; display-panes "set-option -gF @join_target '#{window_index}.%%' ; switch-client -T typhon-join-window-orient"
bind-key -T typhon-join-window 4 select-window -t :4 \; display-panes "set-option -gF @join_target '#{window_index}.%%' ; switch-client -T typhon-join-window-orient"
bind-key -T typhon-join-window 5 select-window -t :5 \; display-panes "set-option -gF @join_target '#{window_index}.%%' ; switch-client -T typhon-join-window-orient"
bind-key -T typhon-join-window 6 select-window -t :6 \; display-panes "set-option -gF @join_target '#{window_index}.%%' ; switch-client -T typhon-join-window-orient"
bind-key -T typhon-join-window 7 select-window -t :7 \; display-panes "set-option -gF @join_target '#{window_index}.%%' ; switch-client -T typhon-join-window-orient"
bind-key -T typhon-join-window 8 select-window -t :8 \; display-panes "set-option -gF @join_target '#{window_index}.%%' ; switch-client -T typhon-join-window-orient"
bind-key -T typhon-join-window 9 select-window -t :9 \; display-panes "set-option -gF @join_target '#{window_index}.%%' ; switch-client -T typhon-join-window-orient"

############################# Join Window Orient ###############################
bind-key -T typhon-join-window-orient Escape switch-client -T prefix
bind-key -T typhon-join-window-orient ? run-shell '"$TYPHON_SCRIPTS/help.sh" typhon-join-window-orient'
typhon_modes="${typhon_modes}#{?#{==:#{client_key_table},typhon-join-window-orient},#[bg=${typhon_gb}] (JW:h/v?) ,}"

# In the typhon-join-window-orient table:
# * v = join to create vertical divider (side-by-side)
# * h = join to create horizontal divider (top/bottom)
bind-key -T typhon-join-window-orient h run-shell 'tmux join-pane -v -s "$(tmux show-option -gqv @join_src)" -t "$(tmux show-option -gqv @join_target)"'
bind-key -T typhon-join-window-orient v run-shell 'tmux join-pane -h -s "$(tmux show-option -gqv @join_src)" -t "$(tmux show-option -gqv @join_target)"'
